name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: azure-app-service-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Obligatorio si guardaste los secrets en Settings → Environments (y no en "Repository secrets").
    # El nombre DEBE coincidir con el environment en GitHub (ej. "production"). Si el tuyo tiene otro nombre, cámbialo aquí.
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deploy package
        run: |
          mkdir -p deploy
          cp package.json package-lock.json deploy/
          cp -r dist deploy/dist

      # Credenciales vía Service Principal (recomendado en CI). Evita depender del XML del publish profile.
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: deploy

