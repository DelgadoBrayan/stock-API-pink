name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: azure-app-service-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Si `AZURE_WEBAPP_PUBLISH_PROFILE` y `AZURE_WEBAPP_NAME` están en Settings → Environments,
    # el nombre aquí debe coincidir (ej. production). Si los pusiste en Repository secrets, comenta esta línea.
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deploy package
        run: |
          mkdir -p deploy
          cp package.json package-lock.json deploy/
          cp -r dist deploy/dist
          cd deploy && npm ci --omit=dev

      # Publish profile (XML completo del .PublishSettings). No uses azure/login con esto.
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy

